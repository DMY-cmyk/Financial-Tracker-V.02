name: CI

on:
  pull_request:
    branches: [main, redesign]
  push:
    branches: [redesign]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Verify static export
        run: |
          test -d out || (echo "ERROR: out/ directory not found" && exit 1)
          test -f out/index.html || (echo "ERROR: out/index.html not found" && exit 1)
          echo "Static export verified: $(find out -name '*.html' | wc -l) HTML files"
